name: release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & package
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_15.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          fi
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: swift test

      - name: Build .app and .dmg
        run: bash Scripts/package_dmg.sh release

      - name: Collect artifact name
        id: artifact
        run: |
          dmg_path=$(ls build/*.dmg | head -n 1)
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$dmg_path")" >> "$GITHUB_OUTPUT"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.dmg_name }}
          path: ${{ steps.artifact.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
          generate_release_notes: true
          body: |
            Automated build from tag ${{ github.ref_name }}.

            > The DMG is **not notarized**. On first launch macOS Gatekeeper
            > will warn about an unidentified developer — right-click the app
            > and choose "Open" to bypass.
