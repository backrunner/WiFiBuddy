name: release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & package
    # macos-26 is GA as of Feb 2026 and ships Xcode 26.x with the Swift 6.2
    # toolchain — matches the SDK WiFiBuddy targets (macOS 26 Liquid Glass).
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Pick the newest Xcode 26 installed on the runner.
          latest_xcode=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$latest_xcode" ]; then
            latest_xcode=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$latest_xcode" ]; then
            latest_xcode=/Applications/Xcode.app
          fi
          echo "Using $latest_xcode"
          sudo xcode-select -s "$latest_xcode"
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: swift test

      - name: Build .app and .dmg
        run: bash Scripts/package_dmg.sh release

      - name: Collect artifact name
        id: artifact
        run: |
          dmg_path=$(ls build/*.dmg | head -n 1)
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$dmg_path")" >> "$GITHUB_OUTPUT"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.dmg_name }}
          path: ${{ steps.artifact.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
          generate_release_notes: true
          # SemVer prerelease tags (anything containing '-', e.g. v0.2.0-beta.1
          # or v0.2.0-rc.1) are published as a GitHub Prerelease and are not
          # marked as the latest release. Plain tags (v0.2.0) are the "latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          body: |
            Automated build from tag ${{ github.ref_name }}.

            > The DMG is **not notarized**. On first launch macOS Gatekeeper
            > will warn about an unidentified developer — right-click the app
            > and choose "Open" to bypass.
